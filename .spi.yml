version: 1
metadata:
  authors: 'Skip.dev and SwiftAndroidNative project authors'
builder:
  configs:
    - documentation_targets:
        - 'AndroidFileManager'
        - 'AndroidHardware'
        - 'AndroidLogging'
        - 'AndroidChoreographer'
        - 'AndroidContext'
        - 'AndroidManifest'
        - 'AndroidInput'
        # doc check error in CI: error: 'body' doesn't exist at '/AndroidLooper/Looper/currentThread(_:)'
        # - 'AndroidLooper'
        # doc check error in CI: error: '2266j' isn't a disambiguation for 'open(_:_:options:permissions:retryOnInterrupt:)' at '/AndroidSystem/FileDescriptor'
        # - 'AndroidSystem'
        # AndroidNative is excluded because its public API is entirely
        # behind #if canImport(Android) and produces empty docs on macOS/Linux.
