version: 1
metadata:
  authors: 'Skip.dev and SwiftAndroidNative project authors'
builder:
  configs:
    - documentation_targets:
        - 'AndroidSystem'
        - 'AndroidLooper'
        - 'AndroidFileManager'
        - 'AndroidHardware'
        - 'AndroidLogging'
        - 'AndroidChoreographer'
        - 'AndroidContext'
        - 'AndroidManifest'
        - 'AndroidInput'
        # AndroidNative is excluded because its public API is entirely
        # behind #if canImport(Android) and produces empty docs on macOS/Linux.
